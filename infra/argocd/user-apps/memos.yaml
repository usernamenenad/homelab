apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: app-memos
  app: memos
  namespace: argocd
spec:
  project: apps
  source:
    repoURL: https://zekker6.github.io/helm-charts/
    chart: memos
    targetRevision: 0.51.0
    helm:
      values: |
        persistence:
          data:
            enabled: true
            storageClass: "hcloud-volumes"
            accessMode: ReadWriteOnce
            size: 10Gi
  destination:
    server: https://kubernetes.default.svc
    namespace: app-memos
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
