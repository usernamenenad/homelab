apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: app-quote
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/usernamenenad/homelab
    targetRevision: main
    path: apps/quote
  destination:
    server: https://kubernetes.default.svc
    namespace: app-quote
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
