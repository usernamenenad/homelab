apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: root-user
  namespace: argocd
spec:
  project: apps
  source:
    repoURL: https://github.com/usernamenenad/homelab
    targetRevision: main
    path: infra/argocd/user-apps
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
