apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: apps
  namespace: argocd
spec:
  description: apps

  sourceRepos:
    - https://github.com/usernamenenad/homelab
    - https://zekker6.github.io/helm-charts/

  destinations:
    - namespace: argocd
      server: https://kubernetes.default.svc
    - namespace: "*"
      server: https://kubernetes.default.svc

  clusterResourceWhitelist:
    - group: "*"
      kind: "*"

  namespaceResourceWhitelist:
    - group: "*"
      kind: "*"

---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: root-user
  namespace: argocd
spec:
  project: apps
  source:
    repoURL: https://github.com/usernamenenad/homelab
    targetRevision: main
    path: infra/argocd/user-apps
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
