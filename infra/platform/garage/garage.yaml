apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: garage
  namespace: argocd
  labels:
    component: storage
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  project: platform
  source:
    repoURL: https://datahub-local.github.io/garage-helm
    chart: garage
    targetRevision: "*"
    helm:
      values: |
        garage:
          replicationFactor: 2

        deployment:
          replicaCount: 2

        persistence:
          meta:
            storageClass: longhorn
            size: 1Gi
          data:
            storageClass: longhorn
            size: 20Gi

        layout:
          enabled: true
          zones:
            - name: dc1
              capacity: 20

        buckets:
          - name: affine-blobs

        keys:
          - name: affine
            buckets:
              - name: affine-blobs
                permissions:
                  read: true
                  write: true
                  owner: true

        resources:
          requests:
            memory: 128Mi
            cpu: 50m
          limits:
            memory: 512Mi
            cpu: 200m

  destination:
    server: https://kubernetes.default.svc
    namespace: garage
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
