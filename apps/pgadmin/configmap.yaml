apiVersion: v1
kind: ConfigMap
metadata:
  name: pgadmin-config
  namespace: apps-pgadmin
data:
  config_local.py: |
    import os

    AUTHENTICATION_SOURCES = ['oauth2']
    OAUTH2_AUTO_CREATE_USER = True
    MASTER_PASSWORD_REQUIRED = True

    OAUTH2_CONFIG = [
      {
        'OAUTH2_NAME':              'entra',
        'OAUTH2_DISPLAY_NAME':      'Microsoft Entra ID',
        'OAUTH2_ICON':              'fa-microsoft',
        'OAUTH2_BUTTON_COLOR':      '#0080ff',
        'OAUTH2_CLIENT_ID':         os.environ['OIDC_CLIENT_ID'],
        'OAUTH2_CLIENT_SECRET':     os.environ['OIDC_CLIENT_SECRET'],
        'OAUTH2_SERVER_METADATA_URL': 'https://login.microsoftonline.com/' + os.environ['OIDC_TENANT_ID'] + '/v2.0/.well-known/openid-configuration',
        'OAUTH2_TOKEN_URL':         'https://login.microsoftonline.com/' + os.environ['OIDC_TENANT_ID'] + '/oauth2/v2.0/token',
        'OAUTH2_AUTHORIZATION_URL': 'https://login.microsoftonline.com/' + os.environ['OIDC_TENANT_ID'] + '/oauth2/v2.0/authorize',
        'OAUTH2_API_BASE_URL':      'https://graph.microsoft.com/v1.0/',
        'OAUTH2_USERINFO_ENDPOINT': 'me',
        'OAUTH2_SCOPE':             'User.Read',
        'OAUTH2_USERNAME_CLAIM':    'userPrincipalName',
      }
    ]
