apiVersion: apps/v1
kind: Deployment
metadata:
  name: pgadmin-app
  metadata: apps-pgadmin
spec:
  selector:
    matchLabels:
      app: pgadmin
  template:
    metadata:
      labels:
        app: pgadmin
    spec:
      securityContext:
        fsGroup: 5050
      containers:
        - name: pgadmin
          image: dpage/pgadmin4:latest
          env:
            - name: PGADMIN_DEFAULT_EMAIL
              value: admin@nenad.cloud
            - name: PGADMIN_DEFAULT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: pgadmin-oidc-creds
                  key: clientSecret
            - name: OIDC_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: pgadmin-oidc-creds
                  key: clientId
            - name: OIDC_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: pgadmin-oidc-creds
                  key: clientSecret
            - name: OIDC_TENANT_ID
              valueFrom:
                secretKeyRef:
                  name: pgadmin-oidc-creds
                  key: tenantId
          resources:
            requests:
              memory: 64Mi
              cpu: 250m
            limits:
              memory: 1Gi
              cpu: 500m
          ports:
            - containerPort: 80
          volumeMounts:
            - name: config
              mountPath: /pgadmin4/config_local.py
              subPath: config_local.py
            - name: data
              mountPath: /var/lib/pgadmin
      volumes:
        - name: config
          configMap:
            name: pgadmin-config
        - name: data
          persistentVolumeClaim:
            claimName: pgadmin-data
