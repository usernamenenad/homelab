apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cloudflared
  namespace: argocd
  labels:
    component: cloudflared
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  project: platform
  source:
    repoURL: https://github.com/usernamenenad/homelab.git
    path: argocd/cloudflared
    targetRevision: HEAD
  destination:
    server: https://kubernetes.default.svc
    namespace: istio-ingress
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    ignoreDifferences:
      - group: ""
        kind: Secret
        name: cloudflared-creds
        jsonPointers:
          - /data
      - group: ""
        kind: Secret
        name: gateway-tls
        jsonPointers:
          - /data
